services:
  db:
    image: postgres:16-alpine
    container_name: scholar-db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scholar-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scholar-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      AUTH_SECRET:  ${AUTH_SECRET}
      AUTH_URL:     ${AUTH_URL}
      NODE_ENV:     production
    command: sh -c "npx prisma db push --skip-generate && node server.js"
    networks:
      - scholar-net

  caddy:
    image: caddy:2-alpine
    container_name: scholar-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - scholar-net

  seed:
    profiles: ["seed"]
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
    command: sh -c "npx prisma db push --skip-generate && npx tsx prisma/seed.ts"
    networks:
      - scholar-net

volumes:
  db_data:
  caddy_data:
  caddy_config:

networks:
  scholar-net:
    driver: bridge
